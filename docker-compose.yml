# Production-style: app (standalone) + PostgreSQL
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reactauth
      POSTGRES_PASSWORD: reactauth
      POSTGRES_DB: reactauth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactauth -d reactauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: reactauth
      DB_PASSWORD: reactauth
      DB_NAME: reactauth
      UPLOAD_ROOT: /app/uploads
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
  uploads: {}
