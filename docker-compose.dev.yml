# Development: PostgreSQL + Next dev server (hot reload). Run: docker compose -f docker-compose.dev.yml up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reactauth
      POSTGRES_PASSWORD: reactauth
      POSTGRES_DB: reactauth
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactauth -d reactauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  next:
    image: node:22-bookworm-slim
    working_dir: /app
    # npm ci only when lock changed or first run (stamp in node_modules volume). Saves minutes on repeat `up`.
    command:
      - sh
      - -c
      - |
          set -e
          STAMP="/app/node_modules/.docker-dev-install-stamp"
          if [ ! -f "$$STAMP" ] || [ "/app/package-lock.json" -nt "$$STAMP" ]; then
            npm ci
            touch "$$STAMP"
          fi
          npx drizzle-kit push --config drizzle.config.mjs
          npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
      # .next on bind mounts (esp. Windows) often breaks Turbopack chunk delivery → ChunkLoadError
      - next_dot_next:/app/.next
      - uploads_dev:/app/uploads
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: reactauth
      DB_PASSWORD: reactauth
      DB_NAME: reactauth
      UPLOAD_ROOT: /app/uploads
      WATCHPACK_POLLING: "true"
      # webpack HMR이 chokidar 경로를 탈 때(일부 환경) 보조
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev: {}
  next_node_modules: {}
  next_dot_next: {}
  uploads_dev: {}
